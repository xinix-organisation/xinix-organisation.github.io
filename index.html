<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XINIX</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--gd:#111118;--g:#2a2a3a;--gl:#4a4a6a;
  --vd:#1a0a2e;--v:#6b21a8;--vm:#7c3aed;--vl:#a855f7;--vg:#c084fc;
  --w:#e2e8f0;--wd:#94a3b8;--r:#ff2222;--rg:#ff4444;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:#050508}
body{background:#050508;color:var(--w);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;cursor:crosshair}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(107,33,168,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(107,33,168,.04) 1px,transparent 1px);background[...]
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none;z-index:1}

.wrap{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem 5rem}
.topbar{position:fixed;top:0;left:0;right:0;height:28px;background:var(--gd);border-bottom:1px solid var(--v);z-index:10}
.c{position:fixed;width:18px;height:18px;z-index:5;opacity:.3}
.c.tl{top:36px;left:8px;border-top:1px solid var(--v);border-left:1px solid var(--v)}
.c.tr{top:36px;right:8px;border-top:1px solid var(--v);border-right:1px solid var(--v)}
.c.bl{bottom:8px;left:8px;border-bottom:1px solid var(--v);border-left:1px solid var(--v)}
.c.br{bottom:8px;right:8px;border-bottom:1px solid var(--v);border-right:1px solid var(--v)}

.hdr{text-align:center;margin-bottom:2rem;margin-top:.5rem}
.hlbl{font-size:.6rem;letter-spacing:.4em;color:var(--vl);margin-bottom:.6rem;opacity:0;animation:fi .5s .3s forwards}
.htitle{font-family:'Rajdhani',sans-serif;font-size:clamp(2.5rem,9vw,5rem);font-weight:700;letter-spacing:.2em;color:var(--w);opacity:0;animation:fi .5s .5s forwards,glitch 8s 2s infinite;text-sha[...]
.hsub{font-size:.62rem;letter-spacing:.3em;color:var(--gl);margin-top:.4rem;opacity:0;animation:fi .5s .7s forwards}
.div{width:100%;max-width:500px;height:1px;background:linear-gradient(90deg,transparent,var(--v),transparent);margin:0 auto 1.75rem;opacity:0;animation:fi .5s .9s forwards}

.intro{max-width:520px;text-align:center;margin-bottom:1.5rem;opacity:0;animation:fi .5s 1.1s forwards}
.iwelcome{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:var(--vl);letter-spacing:.1em;margin-bottom:.6rem;text-transform:uppercase}
.itext{font-size:.7rem;color:var(--wd);line-height:1.9;letter-spacing:.04em}

.warn{width:100%;max-width:560px;background:rgba(127,29,29,.18);border:2px solid var(--r);border-left:5px solid var(--r);padding:1rem 1.2rem;margin-bottom:1.75rem;opacity:0;animation:fi .5s 1.3s f[...]
.wtitle{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--r);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.4rem;text-shadow:0 0 15px rgba(255,34,34,.5)}
.wtitle::before{content:'⚠ '}
.wtext{font-size:.7rem;color:var(--rg);line-height:1.7;letter-spacing:.05em}

.card{width:100%;max-width:560px;background:linear-gradient(135deg,var(--gd) 0%,var(--vd) 100%);border:1px solid var(--g);border-top:1px solid var(--vm);padding:1.75rem 1.5rem;position:relative;op[...]
.card::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,var(--vl),transparent)}
.cprompt{font-size:.56rem;letter-spacing:.3em;color:var(--gl);margin-bottom:1rem}
.cprompt span{color:var(--vl)}
.cinstr{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;color:var(--wd);letter-spacing:.08em;margin-bottom:1.25rem}
.opts{display:flex;flex-direction:column;gap:.65rem}
.opt{display:flex;align-items:center;gap:.85rem;background:rgba(0,0,0,.3);border:1px solid var(--g);padding:.8rem .9rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;-webkit-[...]
.opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(107,33,168,.2);transition:width .3s}
.opt:hover::before,.opt:active::before{width:100%}
.opt:hover,.opt:active{border-color:var(--vm);box-shadow:0 0 12px rgba(107,33,168,.2)}
.okey{font-size:.6rem;color:var(--vl);letter-spacing:.1em;min-width:20px;position:relative;z-index:1}
.otxt{font-family:'Rajdhani',sans-serif;font-size:.92rem;color:var(--wd);letter-spacing:.05em;position:relative;z-index:1;transition:color .2s}
.opt:hover .otxt,.opt:active .otxt{color:var(--w)}

.result{display:none;width:100%;max-width:560px;text-align:center;padding:2.25rem 1.5rem;border:1px solid var(--g)}
.result.ok{background:linear-gradient(135deg,var(--gd),#0d0a1a);border-top:2px solid var(--vl)}
.result.ko{background:linear-gradient(135deg,#0d0000,#1a0505);border:2px solid var(--r);border-top:4px solid var(--r)}
.rico{font-size:2.2rem;margin-bottom:.85rem}
.rtitle{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.2em;margin-bottom:.85rem}
.ok .rtitle{color:var(--vg)}
.ko .rtitle{color:var(--r);text-shadow:0 0 20px rgba(255,34,34,.6);font-size:1.8rem}
.rtxt{font-size:.7rem;color:var(--wd);line-height:1.9;letter-spacing:.04em;margin-bottom:1.25rem}
.ko .rtxt{color:#fca5a5}
.elink{background:rgba(0,0,0,.5);border:1px solid var(--v);padding:.9rem 1.1rem;margin:1.1rem 0;word-break:break-all;font-size:.58rem;color:var(--vg);letter-spacing:.08em;line-height:2;text-align:[...]
.elbl{font-size:.5rem;letter-spacing:.3em;color:var(--gl);margin-bottom:.5rem}
.rkey{font-size:.55rem;color:var(--gl);line-height:1.8;margin-top:.5rem}

.logo{position:fixed;bottom:1.2rem;right:1.2rem;z-index:5;opacity:.2;width:68px;height:68px}

/* Modal — visible uniquement depuis écran bloqué */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;padding:1.5rem}
.modal-bg.show{display:flex}
.modal{background:var(--gd);border:1px solid var(--vm);border-top:2px solid var(--vl);padding:2rem 1.75rem;width:100%;max-width:380px;position:relative}
.modal::before{content:'';position:absolute;top:-1px;left:15px;right:15px;height:2px;background:linear-gradient(90deg,transparent,var(--vl),transparent)}
.modal h3{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--vl);letter-spacing:.2em;margin-bottom:1.25rem;text-transform:uppercase}
.pwd-wrap{position:relative;margin-bottom:1rem}
.pwd-input{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--g);border-bottom:2px solid var(--vm);padding:.75rem 2.8rem .75rem.9rem;font-family:'Share Tech Mono',monospace;font-size:.9rem}
.pwd-input:focus{border-color:var(--vl);box-shadow:0 0 10px rgba(168,85,247,.2)}
.eye-btn{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gl);font-size:1.1rem;padding:.2rem;transition:color .2s;line-height:inherit}
.eye-btn:hover{color:var(--vl)}
.modal-btns{display:flex;gap:.75rem}
.mbtn{flex:1;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.1em;padding:.7rem;border:1px solid var(--g);cursor:pointer;transition:all .2s;background:rgba(0,0,0,.3);color:var(--vl)}
.mbtn.confirm{border-color:var(--vm);color:var(--vl)}
.mbtn:hover{border-color:var(--vl);color:var(--w)}
.modal-err{font-size:.62rem;color:var(--r);letter-spacing:.08em;margin-bottom:.75rem;min-height:1rem}

@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes glitch{0%,90%,100%{text-shadow:0 0 20px rgba(168,85,247,.5),0 0 60px rgba(168,85,247,.2)}92%{text-shadow:-2px 0 var(--vl),2px 0 #06b6d4}94%{text-shadow:2px 0 var(--vl),-2px 0 #06b6d4}96%{text-shadow:0 0 20px rgba(168,85,247,.5)}}
@keyframes pb{0%,100%{box-shadow:0 0 8px rgba(255,34,34,.2)}50%{box-shadow:0 0 20px rgba(255,34,34,.5)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}};</style></head>
